<nav class="navbar" [class.scrolled]="isScrolled">
    <div class="nav-container">

        <!-- LOGO -->
        <a routerLink="/" class="nav-logo" (click)="isMenuOpen = false">
            <div class="logo-icon-bg">
                <img src="brand/logo-icon.png" alt="Logo LaudatoSi Panamá" class="icono-png">
            </div>
            <span class="logo-text">LaudatoSi<span class="text-earth">Panamá</span></span>
        </a>

        <!-- MENÚ ESCRITORIO -->
        <div class="nav-desktop">
            <div class="nav-links">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Inicio</a>
                <a routerLink="/description" routerLinkActive="active">Quiénes Somos</a>
                <a routerLink="/foro" routerLinkActive="active">Foro</a>
                <a routerLink="/contacto" routerLinkActive="active">Contacto</a>
                @if (authService.hasRole(ROLES.ADMIN)) {
                    <a routerLink="/admin" routerLinkActive="active" class="nav-link-admin">
                        <i class="fas fa-shield-alt"></i> Admin
                    </a>
                }
            </div>
        </div>

        <!--
          app-login vive FUERA de nav-desktop para que su modal (position:fixed)
          siempre esté en el DOM, incluso cuando nav-desktop tiene display:none en móvil.
          Sus botones (.navbar-actions) ya tienen display:none en <900px por CSS.
        -->
        <app-login #loginRef></app-login>

        <!-- BOTÓN HAMBURGUESA (MÓVIL) -->
        <button class="menu-toggle" (click)="toggleMenu()" [class.active]="isMenuOpen">
            <span class="line-hamburguer"></span>
            <span class="line-hamburguer"></span>
            <span class="line-hamburguer"></span>
        </button>
    </div>

    <!-- MENÚ MÓVIL -->
    @if (isMenuOpen) {
        <div class="mobile-menu">

            <!-- Links de navegación -->
            <nav class="mm-nav">
                <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="toggleMenu()">
                    <span class="mm-icon"><i class="fas fa-home"></i></span>
                    <span>Inicio</span>
                </a>
                <a routerLink="/description" routerLinkActive="active" (click)="toggleMenu()">
                    <span class="mm-icon"><i class="fas fa-leaf"></i></span>
                    <span>Quiénes Somos</span>
                </a>
                <a routerLink="/foro" routerLinkActive="active" (click)="toggleMenu()">
                    <span class="mm-icon"><i class="fas fa-comments"></i></span>
                    <span>Foro</span>
                </a>
                <a routerLink="/contacto" routerLinkActive="active" (click)="toggleMenu()">
                    <span class="mm-icon"><i class="fas fa-envelope"></i></span>
                    <span>Contacto</span>
                </a>
                @if (authService.hasRole(ROLES.ADMIN)) {
                    <a routerLink="/admin" routerLinkActive="active" (click)="toggleMenu()" class="mm-admin">
                        <span class="mm-icon"><i class="fas fa-shield-alt"></i></span>
                        <span>Panel Admin</span>
                    </a>
                }
            </nav>

            <!-- Acciones de autenticación -->
            <div class="mm-auth">
                @if (loginRef.loginService.isLoggedIn()) {
                    <a routerLink="/usuario" (click)="toggleMenu()" class="mm-btn mm-btn-account">
                        <i class="fas fa-user-circle"></i>
                        <span>Mi Cuenta</span>
                    </a>
                    <button (click)="loginRef.cerrarSesion(); toggleMenu()" class="mm-btn mm-btn-logout">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Cerrar Sesión</span>
                    </button>
                } @else {
                    <button (click)="loginRef.abrirModal(); toggleMenu()" class="mm-btn mm-btn-login">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>Ingresar</span>
                    </button>
                    <a routerLink="/registro" (click)="toggleMenu()" class="mm-btn mm-btn-register">
                        <i class="fas fa-user-plus"></i>
                        <span>Registrarse</span>
                    </a>
                }
            </div>

        </div>
    }
</nav>
